name: test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: platform-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macOS-latest
        cargo_flags:
          - "--no-default-features"
          - "--all-features"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install ZSH
        if: runner.os == 'Linux'
        run: sudo apt-get install zsh
         
      - name: ⚡ Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: |
            ~/.cache/zsh-src
            ~/Library/Caches/dev.zsh-rs.zsh-src

      # - name: ⚡ Cache cargo registry
      #   uses: actions/cache@v5
      #   with:
      #     path: |
      #       ~/.cargo/registry
      #       ~/.cargo/git
      #       ~/.cache/zsh-src
      #       target
      #     key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: 🔍 Debug env before build
        if: runner.os == 'macOS'
        run: |
          echo "CPPFLAGS=$CPPFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          ls -la $(brew --prefix ncurses)/lib/ | head
          ls /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/usr/lib/libncurses* 2>/dev/null || echo "no SDK ncurses"

      - name: 🔨 Build
        run: cargo build --all ${{ matrix.cargo_flags }}
        
      - name: 🧪 Test
        run: cargo test --all ${{ matrix.cargo_flags }}

      - name: 📋 Upload config.log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: config-log-${{ matrix.os }}
          path: |
            ~/Library/Caches/dev.zsh-rs.zsh-src/zsh-5.9/config.log
            ~/.cache/zsh-src/zsh-5.9/config.log

        